output_dir: /BioPathNet/experiments/single_SKG/parents_has_role_hasRole_10000_100_10_2/

dataset:
  class: biomedical
  path: /BioPathNet/data/single_SKG/parents_has_role_hasRole_10000_100_10_2/
  files: ['brg.txt', 'graph_learning_with_validation_and_test.txt', 'edges_for_validation.txt', 'test_relations.txt']

task: 
  class: KnowledgeGraphCompletionBiomed
  model:
    class: NBFNet
    input_dim: 32
    hidden_dims: [32, 32, 32, 32, 32, 32]
    message_func: distmult
    aggregate_func: pna
    short_cut: yes
    layer_norm: yes
    dependent: yes
    symmetric: no
  criterion: bce
  num_negative: 16
  strict_negative: yes
  adversarial_temperature: 0.5
  sample_weight: no
  heterogeneous_negative: yes
  heterogeneous_evaluation: yes
  full_batch_eval: no

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  gpus: {{ gpus }}
  batch_size: 4
  
train:
  num_epoch: 5
  
metric: mrr
checkpoint: {{checkpoint}}
