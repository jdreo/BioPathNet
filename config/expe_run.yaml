output_dir: /Users/claudy/work/projects/BioPathNet/2025-BPN-simplest/experiments/

dataset:
  class: biomedical
  path: /Users/claudy/work/projects/BioPathNet/data/simplest/
  include_factgraph: no
  files: ['brg.txt', 'graph_learning_with_validation_and_test.txt', 'edges_for_validation.txt', 'edges_for_validation.txt']

task:
  class: KnowledgeGraphCompletionBiomed
  model:
    class: NBFNet
    input_dim: 32
    hidden_dims: [32, 32, 32, 32, 32, 32]
    message_func: distmult
    aggregate_func: pna
    short_cut: yes
    layer_norm: yes
    dependent: yes
    symmetric: no
  criterion: bce
  num_negative: 32
  strict_negative: no
  adversarial_temperature: 0.5
  sample_weight: no
  heterogeneous_negative: yes
  heterogeneous_evaluation: yes
  # neg_samp_strategy: sans # [sans, degree, inv_degree]
  # sans_rw_hops: "1000:2" # default 1000:2 # k=2 hop neighborhood approximated with 1000 random walks 
  full_batch_eval: no

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  gpus: {{ gpus }}
  batch_size: 4
  
train:
  num_epoch: 5
  
metric: mrr
