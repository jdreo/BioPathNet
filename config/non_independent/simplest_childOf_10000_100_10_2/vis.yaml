output_dir: {{BIOPATHNET}}/experiments/single_SKG/simplest_10000_10_10_childOf_2

dataset:
  class: biomedical
  path: {{BIOPATHNET}}/data/single_SKG/simplest_childOf_10000_100_10_2/
  files: ['train1.txt', 'train2.txt', 'valid.txt', 'test.txt']

task: 
  class: KnowledgeGraphCompletionBiomed
  model:
    class: NBFNet
    input_dim: 32
    hidden_dims: [32, 32, 32, 32, 32, 32]
    message_func: distmult
    aggregate_func: pna
    short_cut: yes
    layer_norm: yes
    dependent: yes
    symmetric: no
  criterion: bce
  num_negative: 16
  strict_negative: yes
  adversarial_temperature: 0.5
  sample_weight: no
  heterogeneous_negative: yes
  heterogeneous_evaluation: yes
  full_batch_eval: no

optimizer:
  class: Adam
  lr: 5.0e-3

engine:
  gpus: {{ gpus }}
  batch_size: 32
  
train:
  num_epoch: 5
  
metric: mrr
checkpoint: {{checkpoint}}
